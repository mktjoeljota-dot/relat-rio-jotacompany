<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard JOTA · LAILA</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #111318;
    --bg3: #181b22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #ea580c;
    --amber: #f59e0b;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse at 30% 60%,rgba(249,115,22,0.10) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(251,146,60,0.06) 0%,transparent 50%),var(--bg); }
  .login-box { width:380px; padding:2.5rem; background:var(--bg2); border:1px solid var(--border2); border-radius:16px; }
  .login-logo { font-family:'Geist Mono',monospace; font-size:17px; font-weight:700; color:var(--accent2); letter-spacing:0.22em; text-transform:uppercase; margin-bottom:2rem; }
  .login-logo-img { display:block; width:220px; max-width:80%; height:auto; margin-bottom:2rem; }
  .login-title { font-size:22px; font-weight:600; margin-bottom:0.3rem; }
  .login-sub { font-size:14px; color:var(--muted); margin-bottom:2rem; }
  .form-group { margin-bottom:1.1rem; }
  .form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .form-group input { width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border 0.2s; }
  .form-group input:focus { border-color:var(--accent); }
  .login-btn { width:100%; padding:11px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-top:0.5rem; transition:opacity 0.2s; }
  .login-btn:hover { opacity:0.85; }
  .login-error { font-size:13px; color:var(--red); margin-top:10px; display:none; }

  /* APP */
  #app { display:none; }

  /* HEADER */
  .header { background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:60px; position:sticky; top:0; z-index:20; }
  .header-left { display:flex; align-items:center; gap:2rem; }
  .brand { font-family:'Geist Mono',monospace; font-size:11px; color:var(--accent2); letter-spacing:0.14em; text-transform:uppercase; }
  .brand-logo { height:26px; width:auto; display:block; }
  .prod-tabs { display:flex; gap:4px; }
  .prod-tab { padding:7px 20px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid transparent; background:transparent; color:var(--muted); transition:all 0.18s; }
  .prod-tab.active { background:var(--accent); color:#fff; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .user-badge { font-size:12px; color:var(--muted); }
  .user-badge strong { color:var(--text); font-weight:500; }
  .logout-btn { padding:7px 14px; background:transparent; border:1px solid var(--border2); border-radius:8px; color:var(--muted); font-size:12px; cursor:pointer; transition:all 0.15s; }
  .logout-btn:hover { color:var(--red); border-color:var(--red); }

  /* FILTER BAR */
  .filterbar { position:sticky; top:60px; z-index:15; background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 2rem; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .filter-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .fchip { padding:7px 16px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--muted); font-family:'Geist',sans-serif; transition:all 0.16s; }
  .fchip:hover { color:var(--text); background:var(--bg3); }
  .fchip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .filter-custom { display:flex; align-items:center; gap:8px; }
  .filter-custom input[type=date] { padding:6px 10px; background:var(--bg3); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-size:13px; font-family:'Geist',sans-serif; outline:none; color-scheme:dark; }
  .filter-custom span { font-size:12px; color:var(--muted); }
  .fapply { padding:6px 14px; background:var(--accent); border:none; border-radius:7px; color:#fff; font-size:13px; font-weight:600; cursor:pointer; font-family:'Geist',sans-serif; }
  .fapply:hover { opacity:0.85; }

  /* CONTENT */
  .content { max-width:1100px; margin:0 auto; padding:2.5rem 2rem 5rem; }

  /* SECTION */
  .report-section { margin-bottom:3rem; }
  .section-title-row { display:flex; align-items:center; gap:12px; margin-bottom:1.4rem; }
  .section-num { width:28px; height:28px; border-radius:50%; background:rgba(249,115,22,0.14); color:var(--accent2); font-size:11px; font-weight:700; font-family:'Geist Mono',monospace; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .section-name { font-size:18px; font-weight:600; }
  .section-meta { font-size:12px; color:var(--muted); margin-left:auto; }
  .section-divider { height:1px; background:var(--border2); margin-bottom:1.4rem; }

  /* METRIC CARDS */
  .cards-row { display:grid; gap:12px; }
  .cards-2 { grid-template-columns:repeat(2,1fr); }
  .metric-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:1.2rem 1.4rem; }
  .metric-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px; }
  .metric-value { font-size:34px; font-weight:600; font-family:'Geist Mono',monospace; line-height:1; }
  .blue { color:var(--accent2); }
  .green { color:var(--green); }

  /* CHART BOX */
  .cbox { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:1.2rem; }
  .chart-dyn { position:relative; height:280px; }
  .chart-empty { display:flex; align-items:center; justify-content:center; height:100%; color:var(--muted); font-size:13px; }

  @media(max-width:800px){
    .cards-2 { grid-template-columns:1fr; }
    .header { padding:0 1rem; }
    .filterbar { padding:12px 1rem; }
    .content { padding:2rem 1rem 4rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img class="login-logo-img" src="logo.png" alt="JOTA COMPANY">
    <div class="login-title">Bem-vindo</div>
    <div class="login-sub">Acesse o painel de relatórios</div>
    <div class="form-group"><label>E-mail</label><input type="email" id="ei" placeholder="seu@email.com"></div>
    <div class="form-group"><label>Senha</label><input type="password" id="pi" placeholder="••••••••"></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="lerr">E-mail ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="header">
    <div class="header-left">
      <img class="brand-logo" src="logo.png" alt="JOTA COMPANY">
      <div class="prod-tabs">
        <button class="prod-tab active">LAILA</button>
      </div>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge"></div>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <!-- FILTROS -->
  <div class="filterbar">
    <div class="filter-chips">
      <button class="fchip active" data-period="hoje">Hoje</button>
      <button class="fchip" data-period="7d">7 dias</button>
      <button class="fchip" data-period="30d">30 dias</button>
      <button class="fchip" data-period="ano">Este ano</button>
      <button class="fchip" data-period="total">Total</button>
      <button class="fchip" data-period="custom">Personalizado</button>
    </div>
    <div class="filter-custom" id="filter-custom" style="display:none">
      <input type="date" id="dt-start">
      <span>até</span>
      <input type="date" id="dt-end">
      <button class="fapply" id="dt-apply">Aplicar</button>
    </div>
  </div>

  <div class="content">
    <div class="product-page active" id="page-laila">

      <!-- 1 · VISÃO GERAL -->
      <div class="report-section">
        <div class="section-title-row">
          <div class="section-num">1</div>
          <div class="section-name">Visão Geral</div>
          <div class="section-meta" id="laila-meta"></div>
        </div>
        <div class="section-divider"></div>
        <div class="cards-row cards-2">
          <div class="metric-card">
            <div class="metric-label">Leads</div>
            <div class="metric-value blue" id="laila-leads">–</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Transferências</div>
            <div class="metric-value green" id="laila-transf">–</div>
          </div>
        </div>
      </div>

      <!-- 2 · MOTIVO DAS TRANSFERÊNCIAS -->
      <div class="report-section">
        <div class="section-title-row">
          <div class="section-num">2</div>
          <div class="section-name">Motivo das Transferências</div>
          <div class="section-meta" id="laila-transf-meta"></div>
        </div>
        <div class="section-divider"></div>
        <div class="cbox">
          <div class="chart-dyn" id="wrap-transf"><canvas id="ch-transf"></canvas></div>
        </div>
      </div>

      <!-- 3 · ORIGEM DOS LEADS -->
      <div class="report-section">
        <div class="section-title-row">
          <div class="section-num">3</div>
          <div class="section-name">Origem dos Leads</div>
          <div class="section-meta" id="laila-origem-meta"></div>
        </div>
        <div class="section-divider"></div>
        <div class="cbox">
          <div class="chart-dyn" id="wrap-origem"><canvas id="ch-origem"></canvas></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── REGISTER DATALABELS PLUGIN ────────────────────────────────────
if(typeof ChartDataLabels!=='undefined'){Chart.register(ChartDataLabels);}

// ── SUPABASE (projeto JOTA) ───────────────────────────────────────
const SB_URL='https://yiudpzzmysymtctcdqvj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpdWRwenpteXN5bXRjdGNkcXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTQ1NDMsImV4cCI6MjA5OTUzMDU0M30.EF0PY7oikEOgwfKOHoBIHF0x6rSN0urB1gzj0LH0Jlg';
const SB_HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

// ── AUTH ──────────────────────────────────────────────────────────
const USERS = {
  'guilherme@admin.com': { pass:'admin123', role:'admin', name:'Guilherme' },
  'Raphael@joeljota.com': { pass:'Raphael@Equipe789', role:'admin', name:'Raphael', greet:'Bem vindo' },
  'Malu@joeljota.com':    { pass:'Malu@Equipe789', role:'admin', name:'Malu', greet:'Bem vinda' }
};
let me = null;
const SESSION_KEY='jota_dash_session';
['ei','pi'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));

function enterApp(){ document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='block'; initApp(); }
function doLogin(){
  const email=document.getElementById('ei').value.trim(), pass=document.getElementById('pi').value, u=USERS[email];
  if(u&&u.pass===pass){ me={email,...u}; try{localStorage.setItem(SESSION_KEY,email);}catch(e){} enterApp(); }
  else document.getElementById('lerr').style.display='block';
}
function doLogout(){ me=null; try{localStorage.removeItem(SESSION_KEY);}catch(e){} document.getElementById('app').style.display='none'; document.getElementById('login-screen').style.display='flex'; document.getElementById('ei').value=''; document.getElementById('pi').value=''; }
function restoreSession(){
  let email=null; try{email=localStorage.getItem(SESSION_KEY);}catch(e){}
  const u=email&&USERS[email];
  if(u){ me={email,...u}; enterApp(); }
}

// ── CHART HELPERS ─────────────────────────────────────────────────
const CLRS=['#f97316','#fb923c','#f59e0b','#3b82f6','#8b5cf6','#06b6d4','#ec4899','#84cc16','#ef4444','#6366f1','#a855f7','#14b8a6'];
const CHS={};
const TT={backgroundColor:'#1f2937',titleColor:'#e8eaf0',bodyColor:'#9ca3af',padding:10,cornerRadius:8,borderColor:'rgba(255,255,255,0.08)',borderWidth:1};
const TX={color:'#6b7280',font:{family:"'Geist'",size:11}};
const GR={color:'rgba(255,255,255,0.05)'};
const noLegend={display:false};
const shrt=(s,n=26)=>{s=String(s);return s.length>n?s.slice(0,n-1)+'…':s;};
const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
function dch(id){if(CHS[id]){CHS[id].destroy();delete CHS[id];}}

// gráfico de barras horizontal (maior → menor), com valor · % fixo
function barH(id,map){
  dch(id);
  const ctx=document.getElementById(id);if(!ctx)return;
  const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const labels=entries.map(e=>e[0]);
  const data=entries.map(e=>e[1]);
  const total=data.reduce((a,b)=>a+b,0);
  CHS[id]=new Chart(ctx,{type:'bar',data:{labels:labels.map(l=>shrt(l)),datasets:[{data,backgroundColor:data.map((_,i)=>CLRS[i%CLRS.length]+'aa'),borderColor:data.map((_,i)=>CLRS[i%CLRS.length]),borderWidth:1,borderRadius:5}]},options:{indexAxis:'y',layout:{padding:{right:56}},plugins:{legend:noLegend,tooltip:TT,datalabels:{anchor:'end',align:'right',offset:4,clamp:true,color:'#9ca3af',font:{family:"'Geist'",size:10,weight:'500'},formatter:(v)=>{if(!v)return '';const p=total>0?Math.round(v/total*100):0;return Number(v).toLocaleString('pt-BR')+' · '+p+'%';}}},scales:{x:{beginAtZero:true,grid:GR,ticks:{...TX,precision:0}},y:{grid:{display:false},ticks:{...TX,font:{size:11,family:"'Geist'"}}}},maintainAspectRatio:false}});
}
// altura dinâmica conforme número de barras
function setWrapH(id,n){ const el=document.getElementById(id); if(el) el.style.height=Math.max(200,n*34+30)+'px'; }
// mostra "sem dados" no lugar do gráfico
function emptyChart(wrapId,canvasId){
  dch(canvasId);
  const el=document.getElementById(wrapId); if(!el) return;
  el.style.height='120px';
  el.innerHTML='<div class="chart-empty">Sem dados no período</div>';
}
// recria o canvas (após um estado "sem dados")
function ensureCanvas(wrapId,canvasId){
  const el=document.getElementById(wrapId); if(!el) return;
  if(!document.getElementById(canvasId)) el.innerHTML='<canvas id="'+canvasId+'"></canvas>';
}

// ── PERÍODO (limites no fuso de Brasília, UTC-03) ──
const TZ_OFFSET=3*3600000; // UTC-03 (Brasília)
const pad=n=>String(n).padStart(2,'0');
function periodRange(period){
  const now=new Date();
  // Data-calendário no fuso de Brasília (desloca -3h antes de ler o dia)
  const nowBR=new Date(now.getTime()-TZ_OFFSET);
  const y=nowBR.getUTCFullYear(), mo=nowBR.getUTCMonth(), da=nowBR.getUTCDate();
  // Meia-noite de Brasília expressa em UTC (00:00 BRT = 03:00 UTC)
  const startToday=new Date(Date.UTC(y,mo,da)+TZ_OFFSET);
  const tomorrow=new Date(startToday.getTime()+86400000);
  let start=null, end=tomorrow;
  if(period==='hoje') start=startToday;
  else if(period==='7d') start=new Date(startToday.getTime()-6*86400000);
  else if(period==='30d') start=new Date(startToday.getTime()-29*86400000);
  else if(period==='ano') start=new Date(Date.UTC(y,0,1)+TZ_OFFSET);
  else if(period==='total'){ start=null; end=null; }
  else if(period==='custom'){
    const s=document.getElementById('dt-start').value, e=document.getElementById('dt-end').value;
    start=s?new Date(s+'T00:00:00-03:00'):null;
    end=e?new Date(new Date(e+'T00:00:00-03:00').getTime()+86400000):null;
  }
  return {start,end};
}
function dateFilter(col,start,end){
  let q='';
  if(start) q+='&'+col+'=gte.'+encodeURIComponent(start.toISOString());
  if(end)   q+='&'+col+'=lt.'+encodeURIComponent(end.toISOString());
  return q;
}
const fmtUTC=d=>pad(d.getUTCDate())+'/'+pad(d.getUTCMonth()+1)+'/'+d.getUTCFullYear();
function metaText(period,start,end){
  if(period==='total'||(!start&&!end)) return 'Todos os registros';
  if(period==='hoje') return 'Hoje · '+fmtUTC(start);
  const ini=start?fmtUTC(start):'início';
  const fim=end?fmtUTC(new Date(end.getTime()-86400000)):'hoje';
  return ini+' – '+fim;
}

// ── QUERIES (REST direto, com a anon key) ─────────────────────────
// Puxa TODAS as linhas de uma coluna aplicando o filtro de período (pagina de 1000 em 1000).
async function fetchColumn(table,col,dateCol,start,end){
  const out=[]; let from=0; const page=1000;
  while(true){
    const url=SB_URL+'/rest/v1/'+table+'?select='+col+dateFilter(dateCol,start,end);
    const r=await fetch(url,{headers:{...SB_HDR,'Range-Unit':'items','Range':from+'-'+(from+page-1)}});
    if(!r.ok) throw new Error(table+' '+r.status);
    const rows=await r.json();
    if(!Array.isArray(rows)||!rows.length) break;
    for(const row of rows) out.push(row[col]);
    if(rows.length<page) break;
    from+=page;
    if(from>500000) break; // trava de segurança
  }
  return out;
}
function groupCount(values){
  const m={};
  for(let v of values){ const k=(v==null||String(v).trim()==='')?'(sem)':String(v).trim(); m[k]=(m[k]||0)+1; }
  return m;
}

let _period='hoje';
let _reqToken=0;
async function loadLaila(period){
  const token=++_reqToken;
  _period=period;
  const {start,end}=periodRange(period);
  set('laila-leads','…'); set('laila-transf','…');
  const meta=metaText(period,start,end);
  set('laila-meta',meta); set('laila-origem-meta',meta); set('laila-transf-meta',meta);
  try{
    // filtro aplicado simultaneamente às duas tabelas
    const [origem,paraQuem]=await Promise.all([
      fetchColumn('laila_atendimentos','origem','data_entrada',start,end),
      fetchColumn('laila_transferencias','para_quem','timestamp',start,end)
    ]);
    if(token!==_reqToken) return; // resposta obsoleta (usuário trocou o filtro)

    // Seção 1 · cards
    set('laila-leads',origem.length.toLocaleString('pt-BR'));
    set('laila-transf',paraQuem.length.toLocaleString('pt-BR'));

    // Seção 2 · origem dos leads
    const gOrigem=groupCount(origem);
    const nO=Object.keys(gOrigem).length;
    if(nO){ ensureCanvas('wrap-origem','ch-origem'); setWrapH('wrap-origem',nO); barH('ch-origem',gOrigem); }
    else emptyChart('wrap-origem','ch-origem');

    // Seção 3 · motivo das transferências
    const gPara=groupCount(paraQuem);
    const nP=Object.keys(gPara).length;
    if(nP){ ensureCanvas('wrap-transf','ch-transf'); setWrapH('wrap-transf',nP); barH('ch-transf',gPara); }
    else emptyChart('wrap-transf','ch-transf');
  }catch(e){
    if(token!==_reqToken) return;
    console.warn('loadLaila erro',e);
    set('laila-leads','erro'); set('laila-transf','erro');
  }
}

// ── FILTROS UI ────────────────────────────────────────────────────
document.querySelectorAll('.fchip').forEach(b=>b.addEventListener('click',()=>{
  const p=b.dataset.period;
  document.querySelectorAll('.fchip').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const custom=document.getElementById('filter-custom');
  if(p==='custom'){ custom.style.display='flex'; }   // aguarda "Aplicar"
  else { custom.style.display='none'; loadLaila(p); }
}));
document.getElementById('dt-apply').addEventListener('click',()=>loadLaila('custom'));

// ── BOOT ──────────────────────────────────────────────────────────
function initApp(){
  const disp=me.role==='viewer'?'meu patrão':me.name;
  const badge=document.getElementById('user-badge');
  if(badge) badge.innerHTML=(me.greet||'Bem-vindo')+', <strong>'+disp+'</strong>';
  loadLaila('hoje'); // padrão
}
restoreSession();
</script>
</body>
</html>
